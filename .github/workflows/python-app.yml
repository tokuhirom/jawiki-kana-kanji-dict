name: Python application

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '13 13 */20 * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Test
        run: uv run pytest

  build-and-release:
    if: github.ref == 'refs/heads/master' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: |
          sudo apt-get install -y skkdic skkdic-extra
          uv sync
      - name: Build dictionary
        run: make
      - name: Check dictionary
        run: uv run pytest check.py
      - name: Create calver tag
        id: tag
        run: |
          TAG="v$(date -u +%Y.%m.%d.%H%M%S)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            SKK-JISYO.jawiki
            mecab-userdic.csv
