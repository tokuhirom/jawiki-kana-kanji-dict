name: Python application

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '13 13 */20 * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Test
        run: uv run pytest

  build-and-release:
    if: github.ref == 'refs/heads/master' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: |
          sudo apt-get install -y skkdic skkdic-extra
          uv sync
      - name: Build dictionary
        run: make
      - name: Check dictionary
        run: uv run pytest check.py
      - name: Create calver tag
        id: tag
        run: |
          TAG="v$(date -u +%Y.%m.%d.%H%M%S)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            SKK-JISYO.jawiki
            mecab-userdic.csv
