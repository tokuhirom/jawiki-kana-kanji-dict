name: Python application

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '13 13 */20 * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Test
        run: uv run pytest

  build-and-release:
    if: github.ref == 'refs/heads/master' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: |
          sudo apt-get install -y skkdic skkdic-extra
          uv sync
      - name: Build dictionary
        run: make
      - name: Check dictionary
        run: uv run pytest check.py
      - name: Create calver tag
        id: tag
        run: |
          TAG="v$(date -u +%Y.%m.%d.%H%M%S)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Release
        uses: softprops/action-gh-release@26e8ad27a09a225049a7075d7ec1caa2df6ff332 # v2.6.0
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            SKK-JISYO.jawiki
            mecab-userdic.csv
